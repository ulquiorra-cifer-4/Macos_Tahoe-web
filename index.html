<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>macOS Tahoe — Web Emulator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="lockscreen.css" />
  <link rel="stylesheet" href="desktop.css" />
  <link rel="stylesheet" href="apps/notes/notes.css" />
  <link rel="stylesheet" href="apps/finder/finder.css" />
  <link rel="stylesheet" href="apps/photos/photos.css" />
  <link rel="stylesheet" href="apps/reminders/reminders.css" />
</head>
<body>
  <div id="desktop">

    <!-- Wallpaper -->
    <div id="wallpaperLayer"></div>

    <!-- Menu Bar — built by menubar.js -->
    <div id="menuBar"></div>

    <!-- Windows Area -->
    <div id="windows-area"></div>

    <!-- Dock -->
    <div id="dockContainer">
      <div id="dock"></div>
    </div>

  </div>

  <!-- Lock screen — loads first so it's visible immediately -->
  <script src="lockscreen.js"></script>

  <!-- Core -->
  <script src="window-manager.js"></script>

  <!-- Apps -->
  <script src="apps/trash.js"></script>
  <script src="apps/notes/notes-store.js"></script>
  <script src="apps/notes/notes-editor.js"></script>
  <script src="apps/notes/notes-app.js"></script>
  <script src="apps/finder/finder-fs.js"></script>
  <script src="apps/finder/finder-sidebar.js"></script>
  <script src="apps/finder/finder-toolbar.js"></script>
  <script src="apps/finder/finder-grid.js"></script>
  <script src="apps/finder/finder-preview.js"></script>
  <script src="apps/finder/finder-app.js"></script>

  <!-- Photos app -->
  <script src="apps/photos/photos-store.js"></script>
  <script src="apps/photos/photos-sidebar.js"></script>
  <script src="apps/photos/photos-grid.js"></script>
  <script src="apps/photos/photos-lightbox.js"></script>
  <script src="apps/photos/photos-app.js"></script>

  <!-- Reminders app -->
  <script src="apps/reminders/reminders-store.js"></script>
  <script src="apps/reminders/reminders-app.js"></script>

  <!-- Desktop manager — needs FS loaded first -->
  <script src="desktop-manager.js"></script>

  <!-- Menu bar + Dock — last so everything is registered -->
  <script src="menubar.js"></script>
  <script src="dock.js"></script>

  <!-- Boot desktop manager after all scripts are ready -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (typeof window.__initDesktopManager === "function") {
        window.__initDesktopManager();
      }
    });
  </script>
</body>
</html>
